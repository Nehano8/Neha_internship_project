<!DOCTYPE html>
<html>
<head>
    <title>FEEDBACK PAGE</title>
</head>
<body>

<header>
    <h1>Feedback</h1>
</header>

<form>

    <label>Feedback:</label><br>
    <textarea 
        required 
        maxlength="200" 
        placeholder="Enter your feedback (max 200 characters)">
    </textarea><br><br>

    <label>Rating (1 to 10):</label><br>
    <input 
        type="number" 
        min="1" 
        max="10" 
        required 
        placeholder="rating">
    <br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
