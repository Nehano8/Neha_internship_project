<!DOCTYPE html>
<html>
<head>
    <title>LOGIN</title>
</head>
<body>

<h2>Login Form</h2>

<form>

    <label>Username:</label>
    <input 
        type="text" 
        required 
        minlength="3" 
        maxlength="20" 
        placeholder="Enter username">
    <br><br>

    <label>Password:</label>
    <input 
        type="password" 
        required 
        minlength="6" 
        maxlength="12" 
        placeholder="Enter password">
    <br><br>

    <button type="submit">Login</button>
    <button type="reset">Cancel</button>

</form>

</body>
</html>
